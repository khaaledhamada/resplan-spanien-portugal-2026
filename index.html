<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Resplan Spanien &amp; Portugal 14–28 juli 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --paper: #faf6ee;
    --paper-2: #f3ecdd;
    --ink: #2b2420;
    --ink-soft: #55493d;
    --line: #e0d5c0;
    --card-shadow: 0 2px 10px rgba(60,40,20,0.08), 0 1px 2px rgba(60,40,20,0.06);
    --accent-neutral: #6b5f52;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #1b1712;
      --paper-2: #241f18;
      --ink: #ece4d6;
      --ink-soft: #c9bfad;
      --line: #3a3226;
      --card-shadow: 0 2px 10px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.3);
      --accent-neutral: #a89a86;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .lock-card {
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: var(--card-shadow);
    padding: 36px 28px;
    max-width: 360px;
    width: 100%;
    text-align: center;
  }
  .lock-emoji {
    font-size: 40px;
    line-height: 1;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 20px;
    color: var(--ink);
  }
  input[type="password"] {
    width: 100%;
    font-size: 18px;
    letter-spacing: 2px;
    text-align: center;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    margin-bottom: 14px;
  }
  input[type="password"]:focus {
    outline: 2px solid var(--accent-neutral);
    outline-offset: 1px;
  }
  button {
    width: 100%;
    font-size: 16px;
    font-weight: 600;
    padding: 12px 14px;
    border-radius: 12px;
    border: none;
    background: var(--accent-neutral);
    color: var(--paper);
    cursor: pointer;
  }
  button:active {
    opacity: 0.85;
  }
  .error-text {
    color: #b3402c;
    font-size: 14px;
    margin-top: 12px;
    min-height: 18px;
    visibility: hidden;
  }
  .error-text.visible {
    visibility: visible;
  }
  .hint-text {
    color: var(--ink-soft);
    font-size: 12px;
    margin-top: 18px;
  }
</style>
</head>
<body>

<div class="lock-card" id="lockCard">
  <div class="lock-emoji">🔒</div>
  <h1>Resplanen är låst</h1>
  <input type="password" id="pwInput" inputmode="numeric" autocomplete="off" placeholder="Ange kod">
  <button id="unlockBtn" type="button">Lås upp</button>
  <div class="error-text" id="errorText">Fel kod — försök igen</div>
  <div class="hint-text">Koden behöver bara anges en gång per mobil/webbläsare.</div>
</div>

const STORAGE_KEY = "resplan2026-nyckel";

function base64ToBytes(b64) {
  const binStr = atob(b64);
  const bytes = new Uint8Array(binStr.length);
  for (let i = 0; i < binStr.length; i++) {
    bytes[i] = binStr.charCodeAt(i);
  }
  return bytes;
}

function bytesToBase64(bytes) {
  let binStr = "";
  const chunkSize = 0x8000;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    const chunk = bytes.subarray(i, i + chunkSize);
    binStr += String.fromCharCode.apply(null, chunk);
  }
  return btoa(binStr);
}

function showError() {
  const errorText = document.getElementById("errorText");
  errorText.classList.add("visible");
  const pwInput = document.getElementById("pwInput");
  pwInput.value = "";
  pwInput.focus();
}

function renderContent(htmlString) {
  document.open();
  document.write(htmlString);
  document.close();
}

async function deriveKeyFromPassword(password, saltBytes) {
  const passwordBytes = new TextEncoder().encode(password);
  const baseKey = await crypto.subtle.importKey(
    "raw", passwordBytes, "PBKDF2", false, ["deriveKey"]
  );
  const derivedKey = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: saltBytes, iterations: 310000, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    true,
    ["decrypt"]
  );
  return derivedKey;
}

async function tryUnlockWithPassword() {
  const pwInput = document.getElementById("pwInput");
  const password = pwInput.value;
  const errorText = document.getElementById("errorText");

  try {
    const saltBytes = base64ToBytes(ENC.salt);
    const ivBytes = base64ToBytes(ENC.iv);
    const dataBytes = base64ToBytes(ENC.data);

    const derivedKey = await deriveKeyFromPassword(password, saltBytes);
    const plainBuf = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv: ivBytes }, derivedKey, dataBytes
    );
    const htmlString = new TextDecoder().decode(plainBuf);

    try {
      const rawKey = await crypto.subtle.exportKey("raw", derivedKey);
      const rawKeyB64 = bytesToBase64(new Uint8Array(rawKey));
      try { localStorage.setItem(STORAGE_KEY, rawKeyB64); } catch (e) { /* ignoreras */ }
    } catch (e) { /* export misslyckades, fortsatt anda */ }

    errorText.classList.remove("visible");
    renderContent(htmlString);
  } catch (e) {
    showError();
  }
}

async function tryAutoUnlockFromStoredKey() {
  let storedKeyB64 = null;
  try { storedKeyB64 = localStorage.getItem(STORAGE_KEY); } catch (e) { storedKeyB64 = null; }

  if (!storedKeyB64) {
    document.getElementById("pwInput").focus();
    return;
  }

  try {
    const keyBytes = base64ToBytes(storedKeyB64);
    const ivBytes = base64ToBytes(ENC.iv);
    const dataBytes = base64ToBytes(ENC.data);

    const importedKey = await crypto.subtle.importKey(
      "raw", keyBytes, "AES-GCM", false, ["decrypt"]
    );
    const plainBuf = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv: ivBytes }, importedKey, dataBytes
    );
    const htmlString = new TextDecoder().decode(plainBuf);
    renderContent(htmlString);
  } catch (e) {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e2) { /* ignoreras */ }
    document.getElementById("pwInput").focus();
  }
}

document.getElementById("unlockBtn").addEventListener("click", tryUnlockWithPassword);
document.getElementById("pwInput").addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    tryUnlockWithPassword();
  }
});

document.addEventListener("DOMContentLoaded", tryAutoUnlockFromStoredKey);
